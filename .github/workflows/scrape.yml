name: Scrape

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/pyproject.toml

      - name: Install dependencies
        run: pip install -e ./scraper

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
        run: python -m poketracker.main -v

      - name: Report per-site errors
        if: always()
        run: |
          echo "## Scrape run errors" >> "$GITHUB_STEP_SUMMARY"
          if [ -s data/errors/last_run.json ] && [ "$(jq '.errors | length' data/errors/last_run.json)" -gt 0 ]; then
            jq -r '.errors[] | "- **\(.site_id)**: \(.error)"' data/errors/last_run.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No site errors this run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "chore(data): scrape run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
