# match_keywords: a list of AND-groups; each group is a list of OR'd synonyms (a plain string
# is shorthand for a 1-item group). A title must hit EVERY group to match. This is what lets a
# generic product type like "ETB" — which alone would match every Pokemon set ever sold — be
# scoped to one specific set via a second group, e.g. [["etb"], ["héros transcendants", "me2.5"]].
# Generic words ("coffret", "pokemon", "collection") are deliberately never enough on their own.
#
# priority: 1-5 star rating, taken directly from the user's own wishlist. Informational for now
# (not yet wired into filtering/notification, but useful for a future dashboard sort order).
# release_date: ISO date where known; informational only.
#
# All msrp_eur values below are ESTIMATES based on typical prior-set French MSRP for that product
# type — none of these products have official pricing yet (2026-09 through 2026-12 releases).
# Correct them once real pricing is announced; tolerance_pct absorbs some of the estimate error.

x-set-30th: &set_30th ["30th", "célébration", "celebration", "30 ans", "30-jarig jubileum"]
x-set-heros-transcendants: &set_heros ["héros transcendants", "heros transcendants", "me2.5", "me02.5", "me02-5"]
x-set-rivalites-destinees: &set_rivalites ["rivalités destinées", "rivalites destinees", "ev10", "sv10"]

