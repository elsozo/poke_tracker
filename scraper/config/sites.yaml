    scraper_class: generic_prestashop
    selectors:
      listing_item: "article.js-product-miniature"
      title_link: "h3.s_title_block a"
    rate_limit_rps: 0.3
    timeout_s: 15

  dracaugames:
    enabled: true
    priority: B
    locale: FR
    base_url: "https://www.dracaugames.com"
    scraper_class: generic_shopify
    rate_limit_rps: 0.5
    timeout_s: 15

  relictcg:
