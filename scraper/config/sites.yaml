# Each entry maps a site_id to its scraping config. Adding a new PrestaShop/Shopify/WooCommerce
# boutique shop needs no new Python code: pick the matching scraper_class and set start_urls.
# See docs/ADDING_A_SITE.md for the full walkthrough.
#
# locale: country/locale this site ships from (FR, BE, NL, IE...) - informational + used for
# future locale-scoped filtering, not currently gating anything on its own.
sites:
  # ===================== France =====================
  ludifolie:
    enabled: true
    priority: B
    locale: FR
    base_url: "https://www.ludifolie.com"
    start_urls:
      - "https://www.ludifolie.com/recherche?controller=search&s=pokemon"
    scraper_class: generic_prestashop
    rate_limit_rps: 0.3
    timeout_s: 15

  variantes:
    enabled: true
    priority: B
    locale: FR
    base_url: "https://www.variantes.com"
    start_urls:
      - "https://www.variantes.com/recherche?controller=search&s=pokemon"
    scraper_class: generic_prestashop
    selectors:
      listing_item: "article.js-product-miniature"
    rate_limit_rps: 0.3
    timeout_s: 15

  bcdjeux:
    enabled: true
    priority: B
    locale: FR
    base_url: "https://www.bcd-jeux.fr"
    start_urls:
      - "https://www.bcd-jeux.fr/recherche?controller=search&s=pokemon"
    scraper_class: generic_prestashop
    selectors:
